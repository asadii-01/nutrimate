<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- Top App Bar (Simplified for Flow) -->
<header class="bg-surface-bright shadow-[0px_4px_20px_rgba(15,23,42,0.05)] fixed top-0 w-full z-50 flex justify-between items-center px-margin-mobile md:px-lg h-16 w-full">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-2xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">nutrition</span>
<span class="font-display-lg text-headline-md text-primary">NutriMate</span>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow pt-24 pb-32 px-margin-mobile md:px-lg flex justify-center items-start overflow-y-auto">
<div class="w-full max-w-2xl flex flex-col gap-lg">
<!-- Progress Indicator -->
<div class="w-full">
<div class="flex justify-between items-center mb-2 px-1">
<span class="font-label-md text-label-md text-primary">Step 2 of 4</span>
<span class="font-label-md text-label-md text-on-surface-variant">Activity Level</span>
</div>
<div class="w-full bg-surface-container-high h-2 rounded-full overflow-hidden">
<div class="bg-primary h-full rounded-full" style="width: 50%;"></div>
</div>
</div>
<!-- Header -->
<div class="text-center md:text-left mb-sm">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-2">How active are you?</h1>
<p class="font-body-md text-body-md text-on-surface-variant">This helps us calculate your daily calorie needs more accurately.</p>
</div>
<!-- Step 2 Content: Activity Levels -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-sm">
<!-- Card 1 -->
<label class="relative flex flex-col p-md rounded-xl bg-surface-container-lowest border border-outline-variant shadow-[0px_4px_20px_rgba(15,23,42,0.05)] cursor-pointer hover:border-primary hover:bg-surface-container-low transition-colors duration-200 group">
<input class="peer sr-only" name="activity" type="radio"/>
<div class="absolute inset-0 rounded-xl border-2 border-transparent peer-checked:border-primary pointer-events-none"></div>
<div class="absolute top-4 right-4 text-outline-variant peer-checked:text-primary opacity-0 peer-checked:opacity-100 transition-opacity">
<span class="material-symbols-outlined" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="flex items-center gap-4 mb-3">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary group-hover:bg-primary-container group-hover:text-on-primary-container transition-colors">
<span class="material-symbols-outlined text-2xl">chair</span>
</div>
<div>
<h3 class="font-label-md text-label-md text-on-surface">Sedentary</h3>
</div>
</div>
<p class="font-body-md text-body-md text-on-surface-variant text-sm">Little to no exercise, desk job most of the day.</p>
</label>
<!-- Card 2 -->
<label class="relative flex flex-col p-md rounded-xl bg-surface-container-lowest border border-outline-variant shadow-[0px_4px_20px_rgba(15,23,42,0.05)] cursor-pointer hover:border-primary hover:bg-surface-container-low transition-colors duration-200 group">
<input checked="" class="peer sr-only" name="activity" type="radio"/>
<div class="absolute inset-0 rounded-xl border-2 border-transparent peer-checked:border-primary pointer-events-none"></div>
<div class="absolute top-4 right-4 text-outline-variant peer-checked:text-primary opacity-0 peer-checked:opacity-100 transition-opacity">
<span class="material-symbols-outlined" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="flex items-center gap-4 mb-3">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary group-hover:bg-primary-container group-hover:text-on-primary-container transition-colors peer-checked:bg-primary-container peer-checked:text-on-primary-container">
<span class="material-symbols-outlined text-2xl">directions_walk</span>
</div>
<div>
<h3 class="font-label-md text-label-md text-on-surface">Lightly Active</h3>
</div>
</div>
<p class="font-body-md text-body-md text-on-surface-variant text-sm">Light exercise or sports 1-3 days a week.</p>
</label>
<!-- Card 3 -->
<label class="relative flex flex-col p-md rounded-xl bg-surface-container-lowest border border-outline-variant shadow-[0px_4px_20px_rgba(15,23,42,0.05)] cursor-pointer hover:border-primary hover:bg-surface-container-low transition-colors duration-200 group">
<input class="peer sr-only" name="activity" type="radio"/>
<div class="absolute inset-0 rounded-xl border-2 border-transparent peer-checked:border-primary pointer-events-none"></div>
<div class="absolute top-4 right-4 text-outline-variant peer-checked:text-primary opacity-0 peer-checked:opacity-100 transition-opacity">
<span class="material-symbols-outlined" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="flex items-center gap-4 mb-3">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary group-hover:bg-primary-container group-hover:text-on-primary-container transition-colors">
<span class="material-symbols-outlined text-2xl">fitness_center</span>
</div>
<div>
<h3 class="font-label-md text-label-md text-on-surface">Moderately Active</h3>
</div>
</div>
<p class="font-body-md text-body-md text-on-surface-variant text-sm">Moderate exercise or sports 3-5 days a week.</p>
</label>
<!-- Card 4 -->
<label class="relative flex flex-col p-md rounded-xl bg-surface-container-lowest border border-outline-variant shadow-[0px_4px_20px_rgba(15,23,42,0.05)] cursor-pointer hover:border-primary hover:bg-surface-container-low transition-colors duration-200 group">
<input class="peer sr-only" name="activity" type="radio"/>
<div class="absolute inset-0 rounded-xl border-2 border-transparent peer-checked:border-primary pointer-events-none"></div>
<div class="absolute top-4 right-4 text-outline-variant peer-checked:text-primary opacity-0 peer-checked:opacity-100 transition-opacity">
<span class="material-symbols-outlined" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="flex items-center gap-4 mb-3">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary group-hover:bg-primary-container group-hover:text-on-primary-container transition-colors">
<span class="material-symbols-outlined text-2xl">pool</span>
</div>
<div>
<h3 class="font-label-md text-label-md text-on-surface">Very Active</h3>
</div>
</div>
<p class="font-body-md text-body-md text-on-surface-variant text-sm">Hard exercise or sports 6-7 days a week.</p>
</label>
<!-- Card 5 -->
<label class="relative flex flex-col p-md rounded-xl bg-surface-container-lowest border border-outline-variant shadow-[0px_4px_20px_rgba(15,23,42,0.05)] cursor-pointer hover:border-primary hover:bg-surface-container-low transition-colors duration-200 group md:col-span-2">
<input class="peer sr-only" name="activity" type="radio"/>
<div class="absolute inset-0 rounded-xl border-2 border-transparent peer-checked:border-primary pointer-events-none"></div>
<div class="absolute top-4 right-4 text-outline-variant peer-checked:text-primary opacity-0 peer-checked:opacity-100 transition-opacity">
<span class="material-symbols-outlined" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="flex items-center gap-4 mb-3">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary group-hover:bg-primary-container group-hover:text-on-primary-container transition-colors">

<h3 class="font-label-md text-label-md text-on-surface">Extra Active</h3>
</div>
</div>
<p class="font-body-md text-body-md text-on-surface-variant text-sm">Very hard exercise, physical job, or training twice a day.</p>
</label>

<button class="px-6 py-3 rounded-xl bg-surface-container-low text-primary font-label-md text-label-md border border-transparent hover:bg-surface-container transition-colors flex items-center gap-2 active:scale-95 duration-200">
<span class="material-symbols-outlined">arrow_back</span>
            Back

<button class="px-8 py-3 rounded-xl bg-primary text-on-primary font-label-md text-label-md shadow-[0px_4px_20px_rgba(15,23,42,0.05)] hover:opacity-90 transition-opacity flex items-center gap-2 active:scale-95 duration-200">
